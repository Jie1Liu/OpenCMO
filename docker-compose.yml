services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: aimo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aimo
      POSTGRES_PASSWORD: aimo
      POSTGRES_DB: aimo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aimo -d aimo"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
